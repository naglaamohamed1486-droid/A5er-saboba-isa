{% extends "base.html" %}
{% load static %}

{% block styles %}
<link rel="stylesheet" href="{% static 'css/form.css' %}">
{% endblock %}

{% block content %}
<main>

  <div class="hero">
    <h1 class="tit">Apply Now </h1>
    <p>Let’s get you started, <span> just fill out the form below</span></p>

  </div>
  <div class="card">
    <div class="job-details">
      <h3 class="Job-Title" id="title"></h3>
      <div class="data">
        <div class="Company" id="company"></div>
        <div class="type" id="type"></div>
      </div>
    </div>
    <form>
      <div class="in">
        <input type="text" id="text" placeholder="Enter your name" required>
        <label for="text">Name</label>
      </div>
      <div class="in">
        <input type="email" id="email" placeholder="Enter your email" required>
        <label for="email">Email</label>
      </div>
      <label for="cv" class="cv-upload">
        <p><span>Click to upload</span> your CV or drag & drop</p>
      </label>
      <input type="file" id="cv" name="cv" required>
      <div class="btn">
        <button class="submit">Submit Application</button>
        <a href="./search.html" class="ca">Cancel</a>
      </div>
    </form>
  </div>
</main>


{% block scripts %}
<script src="{% static 'js/form.js' %}"></script>
{% endblock %}
{% endblock %}
