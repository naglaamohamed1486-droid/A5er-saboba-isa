{% extends "base.html" %}
{% load static %}

{% block styles %}
<link rel="stylesheet" href="{% static 'css/editjob.css' %}">
{% endblock %}

{% block content %}

<!-- HERO -->
<section class="hero compact-hero">
  <div class="hero-container">
    <h1>Edit Job</h1>
    <p>Update the details for this job listing</p>
  </div>
</section>

<!-- MAIN FORM -->
<main class="form-container">
  <form method="POST">
    {% csrf_token %}

    <div class="card">
      <div class="card-title">
        <h3>Job Details</h3>
      </div>

      <div class="input-grid">
        <div class="input-group">
          <label>Cover URL</label>
          <input name="cover" type="url" value="{{ job.cover }}" required>
        </div>

        <div class="input-group">
          <label>Job Title</label>
          <input name="title" type="text" value="{{ job.title }}" required>
        </div>

        <div class="input-group">
          <label>Company Name</label>
          <input name="company" type="text" value="{{ job.company }}" required>
        </div>

        <div class="input-group">
          <label>Location</label>
          <input name="location" type="text" value="{{ job.location }}" required>
        </div>

        <div class="input-group">
          <label>Time</label>
          <input name="time" type="text" value="{{ job.time }}" required>
        </div>

        <div class="input-group">
          <label>Salary</label>
          <input name="salary" type="text" value="{{ job.salary }}" required>
        </div>

        <div class="input-group">
          <label>Type</label>
          <input name="type" type="text" value="{{ job.type }}" required>
        </div>

        <div class="input-group">
          <label>Experience</label>
          <input name="exp" type="text" value="{{ job.exp }}" required>
        </div>

        <div class="input-group">
          <label>Company Location</label>
          <input name="companyLocation" type="text" value="{{ job.companyLocation }}" required>
        </div>

        <div class="input-group">
          <label>Employees</label>
          <input name="employees" type="text" value="{{ job.employees }}" required>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="card-title">
        <h3>Additional Info</h3>
      </div>

      <div class="input-group full-width">
        <label>Description</label>
        <textarea name="description" rows="6" required>{{ job.description }}</textarea>
      </div>

      <div class="input-group full-width">
        <label>Tags JSON</label>
        <textarea name="tags" rows="3" required>{{ job.tags }}</textarea>
      </div>

      <div class="input-group full-width">
        <label>Required JSON</label>
        <textarea name="required" rows="3" required>{{ job.required }}</textarea>
      </div>

      <div class="input-group full-width">
        <label>Benefit JSON</label>
        <textarea name="benefit" rows="3" required>{{ job.benefit }}</textarea>
      </div>

      <div class="input-group full-width">
        <label>Gallery JSON</label>
        <textarea name="gallery" rows="3" required>{{ job.gallery }}</textarea>
      </div>
    </div>

    <div class="card">
      <div class="form-footer-action">
        <a href="{% url 'job_list' %}" class="btn-cancel">Cancel</a>
        <button type="submit" class="btn-post">⚡ Update Job</button>
      </div>
    </div>

  </form>
</main>
<script src="./js/navbar.js"></script>


</body>


{% endblock %}
