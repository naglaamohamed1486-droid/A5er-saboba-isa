{% extends "base.html" %}
{% load static %}

{% block styles %}
<link rel="stylesheet" href="{% static 'css/saved.css' %}">
{% endblock %}

{% block content %}

<main>
  <!-- Hero -->
  <div class="float">
    <div class="hero">
      <h1>Saved Jobs</h1>
      <h4>Your bookmarked opportunities</h4>
    </div>
  </div>

  <!-- Count -->
  <h3 id="savedCount">0 jobs saved</h3>

  <!-- Jobs Grid -->
  <div class="job">
    <div class="job-list" id="savedList"></div>
  </div>

  <!-- Empty State -->
  <div class="empty-state" id="emptyState" style="display:none;">
    <div class="empty-state__icon">💔</div>
    <h3 class="empty-state__title">No saved jobs yet</h3>
    <p class="empty-state__desc">Browse jobs and tap the ❤️ to save them here</p>
    <a href="search.html" class="empty-btn">Browse Jobs →</a>
  </div>
</main>



{% block scripts %}
<script src="{% static 'js/jobcard.js' %}"></script>
<script src="{% static 'js/saved.js' %}"></script>
{% endblock %}
{% endblock %}
